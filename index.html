<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dumped</title>
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="/manifest.webmanifest">
    <script>
        window.onerror = function (message, source, lineno, colno, error) {
            var div = document.createElement('div');
            div.style.position = 'fixed';
            div.style.top = '0';
            div.style.left = '0';
            div.style.width = '100%';
            div.style.zIndex = '9999';
            div.style.padding = '20px';
            div.style.background = '#fee2e2';
            div.style.color = '#991b1b';
            div.style.whiteSpace = 'pre-wrap';
            div.style.fontFamily = 'monospace';
            div.innerHTML = '<strong>RUNTIME ERROR:</strong><br>' + message + '<br>At: ' + source + ':' + lineno + ':' + colno + (error ? '<br>Stack: ' + error.stack : '');
            document.body.appendChild(div);
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Google One Tap / Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        html {
            overflow-y: auto;
            -ms-overflow-style: none; /* IE and Edge */
            scrollbar-width: none; /* Firefox */
        }

        html::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            transition: background-color 0.5s ease;
        }

        h1, h2, h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: -0.02em;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }

        .bento-card {
            transition: all 0.2s ease;
            background: white;
            position: relative;
            overflow: hidden;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Ambient effects */
        @keyframes ambient-float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-10px) rotate(2deg); }
            66% { transform: translateY(5px) rotate(-1deg); }
        }

        .ambient-float {
            animation: ambient-float 8s ease-in-out infinite;
        }

        @keyframes bg-scrolling {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        .animate-bg-scrolling {
            animation: bg-scrolling 60s linear infinite;
        }

        /* Custom focus aesthetics */
        input:focus, textarea:focus {
            outline: none !important;
            box-shadow: none !important;
            border-color: inherit !important;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>

</html>
