<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dumped</title>
    <link rel="icon" type="image/png" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="/manifest.webmanifest">
    <script>
        window.onerror = function (message, source, lineno, colno, error) {
            var div = document.createElement('div');
            div.style.position = 'fixed';
            div.style.top = '0';
            div.style.left = '0';
            div.style.width = '100%';
            div.style.zIndex = '9999';
            div.style.padding = '20px';
            div.style.background = '#fee2e2';
            div.style.color = '#991b1b';
            div.style.whiteSpace = 'pre-wrap';
            div.style.fontFamily = 'monospace';
            div.innerHTML = '<strong>RUNTIME ERROR:</strong><br>' + message + '<br>At: ' + source + ':' + lineno + ':' + colno + (error ? '<br>Stack: ' + error.stack : '');
            document.body.appendChild(div);
        };

        function lockPortrait() {
            try {
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('portrait').catch(function() {});
                }
            } catch (err) {}
        }
        window.addEventListener('load', lockPortrait);
        window.addEventListener('click', lockPortrait);
        window.addEventListener('touchstart', lockPortrait);
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Google One Tap / Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        html {
            overflow-y: auto;
            -ms-overflow-style: none; /* IE and Edge */
            scrollbar-width: none; /* Firefox */
            background: transparent;
            overscroll-behavior: none;
        }

        html::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }

        body {
            background: transparent;
            overscroll-behavior: none;
            color: #0f172a;
        }

        h1, h2, h3 {
            letter-spacing: -0.02em;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }

        .bento-card {
            transition: all 0.2s ease;
            background: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Ambient effects */
        @keyframes ambient-float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-10px) rotate(2deg); }
            66% { transform: translateY(5px) rotate(-1deg); }
        }

        .ambient-float {
            animation: ambient-float 8s ease-in-out infinite;
        }

        @keyframes bg-scrolling {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        .animate-bg-scrolling {
            animation: bg-scrolling 60s linear infinite;
        }

        /* CUSTOM FOCUS AESTHETICS */
        input:focus,
        textarea:focus {
            outline: none !important;
            box-shadow: none !important;
            border-color: inherit !important;
        }

        input,
        textarea {
            caret-color: #6366f1; /* Indigo — consistent with dump screen */
        }

        /* Landing page subtext reveal */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Gradient animation blob keyframes */
        @keyframes moveInCircle {
            0%   { transform: rotate(0deg); }
            50%  { transform: rotate(180deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes moveVertical {
            0%   { transform: translateY(-50%); }
            50%  { transform: translateY(50%); }
            100% { transform: translateY(-50%); }
        }
        @keyframes moveHorizontal {
            0%   { transform: translateX(-50%) translateY(-10%); }
            50%  { transform: translateX(50%) translateY(10%); }
            100% { transform: translateX(-50%) translateY(-10%); }
        }
        .animate-first  { animation: moveVertical   30s ease    infinite; }
        .animate-second { animation: moveInCircle   20s reverse infinite; }
        .animate-third  { animation: moveInCircle   40s linear  infinite; }
        .animate-fourth { animation: moveHorizontal 40s ease    infinite; }
        .animate-fifth  { animation: moveInCircle   20s ease    infinite; }

        /* Aurora background animation */
        @keyframes aurora {
            from { background-position: 50% 50%, 50% 50%; }
            to   { background-position: 350% 50%, 350% 50%; }
        }

        /* Onboarding slide transitions */
        @keyframes obSlideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes obSlideInLeft {
            from { opacity: 0; transform: translateX(-40px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes obDotBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40%            { transform: scale(1.1); opacity: 1; }
        }

        @keyframes pulse-gentle {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.05); opacity: 0.35; }
        }
        .animate-pulse-gentle {
            animation: pulse-gentle 4s ease-in-out infinite;
        }

        /* Block horizontal (landscape) view on mobile/tablet devices */
        @media screen and (orientation: landscape) and (max-width: 1024px) and (hover: none) and (pointer: coarse) {
            #portrait-only-overlay {
                display: flex !important;
            }
            #root {
                display: none !important;
            }
        }

        @keyframes rotate-device {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
        }
        .animate-rotate-device {
            animation: rotate-device 2.2s ease-in-out infinite;
        }
    </style>
</head>

<body>
    <div id="root-bg" style="position: fixed; inset: 0; background: #ffffff; z-index: 0;"></div>
    <div id="portrait-only-overlay" style="display: none; position: fixed; inset: 0; background: #ffffff; color: #0f172a; z-index: 99999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; font-family: 'Plus Jakarta Sans', sans-serif;">
        <div class="animate-rotate-device" style="margin-bottom: 20px; color: #6366f1;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width: 48px; height: 48px;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 1.5H8.25A2.25 2.25 0 0 0 6 3.75v16.5a2.25 2.25 0 0 0 2.25 2.25h7.5A2.25 2.25 0 0 0 18 20.25V3.75a2.25 2.25 0 0 0-2.25-2.25H13.5m-3 0V3h3V1.5m-3 0h3m-3 18.75h3" />
            </svg>
        </div>
        <h2 style="font-size: 20px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.02em; color: #1e293b;">Portrait view is best.</h2>
        <p style="font-size: 13px; color: #64748b; max-width: 260px; line-height: 1.6;">Please rotate your device vertically. Dumped is designed exclusively for vertical focus.</p>
    </div>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>

</html>
